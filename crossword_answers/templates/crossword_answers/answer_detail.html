{% extends "base.html" %}

{% block title %}{{ answer.text }}{% endblock %}

{% block content %}
<article>
    <header>
        <h1>{{ answer.text }}</h1>
    </header>
    <p>
        <strong>Zdroj:</strong>
        {% if answer.source_url %}
            <a href="{{ answer.source_url.url }}">{{ answer.source_url.url }}</a>
        {% else %}
            Není uveden.
        {% endif %}
    </p>
    <footer>
        <a href="{% url 'crossword_answers:update' answer.pk %}" role="button">Upravit</a>
        <a href="{% url 'crossword_answers:delete' answer.pk %}" class="secondary">Smazat</a>
        <a href="{% url 'crossword_answers:list' %}" class="secondary">Zpět na seznam</a>
    </footer>
</article>
{% endblock %}
