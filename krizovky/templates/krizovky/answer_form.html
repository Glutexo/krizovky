{% extends "base.html" %}

{% block title %}{% if object %}Upravit tajenku{% else %}Nová tajenka{% endif %}{% endblock %}

{% block content %}
<h1>{% if object %}Upravit tajenku{% else %}Nová tajenka{% endif %}</h1>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <p><a href="{% url 'krizovky:source_url_create' %}">Přidat novou zdrojovou URL</a></p>
    <button type="submit">Uložit</button>
    <a href="{% url 'krizovky:list' %}" class="secondary">Zrušit</a>
</form>
{% endblock %}
