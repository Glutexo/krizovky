{% extends "base.html" %}

{% block title %}Skrýt tajenku{% endblock %}

{% block content %}
<h1>Skrýt tajenku</h1>
<p>Opravdu chceš skrýt tajenku <strong>{{ answer.text }}</strong>?</p>

</form>
{% endblock %}
