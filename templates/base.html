<!doctype html>
<html lang="cs">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Křížovky{% endblock %}</title>
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    >
    <style>
        .link-button {
            background: none;
            border: 0;
            color: var(--pico-primary);
            cursor: pointer;
            display: inline;
            font: inherit;
            margin: 0;
            padding: 0;
            text-decoration: underline;
        }
    </style>
</head>
<body>
<main class="container">
    <nav>
        <ul>
            <li><strong>Křížovky</strong></li>
        </ul>
        <ul>
            <li><a href="{% url 'krizovky:list' %}">Tajenky</a></li>
            <li><a href="{% url 'krizovky:source_url_list' %}">URL zdroje</a></li>
            <li><a href="{% url 'krizovky:create' %}" role="button">Nová tajenka</a></li>
        </ul>
    </nav>
    {% block content %}{% endblock %}
</main>
</body>
</html>
